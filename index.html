<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Verfügbarkeitskalender – Hafenglück</title>
  <meta name="description" content="Verfügbarkeitskalender der Ferienwohnung Hafenglück." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <header class="hero">
      <h1>Verfügbarkeitskalender – Hafenglück</h1>
      <p>Prüfen Sie hier die aktuelle Verfügbarkeit unserer Ferienwohnung.</p>
    </header>

    <section class="legend" aria-label="Legende">
      <span><i class="dot free"></i> Frei</span>
      <span><i class="dot booked"></i> Belegt</span>
      <span><i class="dot changeover"></i> An-/Abreise</span>
      <span><i class="dot past"></i> Vergangen</span>
    </section>

    <section id="status" class="status">Kalender wird geladen …</section>
    <section id="calendar" class="calendar" aria-live="polite"></section>

    <footer class="footer">
      <p id="syncInfo">Synchronisiert mit Airbnb, Booking.com und FeWo-direkt.</p>
      <p>
        <a href="https://hafengluck-moderne-ferienwohnung-direkt-am-hafen.jimdosite.com/impressum" target="_blank" rel="noopener">Impressum</a>
        <span>·</span>
        <a href="https://hafengluck-moderne-ferienwohnung-direkt-am-hafen.jimdosite.com/datenschutz" target="_blank" rel="noopener">Datenschutz</a>
      </p>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
